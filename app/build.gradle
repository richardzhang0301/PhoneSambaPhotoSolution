plugins {
    id "com.android.application"
}

android {
    namespace "com.diytools.phonesambaphoto"
    compileSdk 35

    defaultConfig {
        applicationId "com.diytools.phonesambaphoto"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation "eu.agno3.jcifs:jcifs-ng:2.1.10"
}
